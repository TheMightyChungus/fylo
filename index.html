<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="fylo.css">


</head>


  <body>

    <div class="main">
    <div class="left_container">
      <div class="fylo">
        <img src="images/logo.svg"> 
      </div>

    <div class="images">
      <div class="box one">
        <img src="images/icon-document.svg">
      </div>
      <div class="box two">
        <img src="images/icon-folder.svg">
      </div>
      <div class="box three">
        <img src="images/icon-upload.svg">
      </div>
    </div>
    </div>

    <div class="right_container">
      <div class="remaining">
        <div class="letterbox first">1</div>
        <div class="letterbox second">8</div>
        <div class="letterbox third">5</div>
        <div class="gbleft"><p>GB LEFT</p></div>
      </div>
      <div class="text_box">
        <p>You've used <span id="storage"> 815 GB</span> of storage</p>
      </div>
      <div class="gradient">
        <div class="gradient_color">
          <div class="circle">
            
          </div>
        </div>
      </div>
      <div class="gb">
        <div class="gbox">0 GB</div>
        <div class="gbox">1000 GB</div>
    </div>
  
    </div>
      

  </div>
  </body>


</html>
